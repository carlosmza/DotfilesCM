# swww-presets.conf
# Formato de cada preset (una línea por preset):
# --transition-type <tipo> --transition-duration <seg> --transition-fps <fps> [opciones extra]
#
# Tipos disponibles: none, simple, fade, left, right, top, bottom,
#                    wipe, wave, grow, center, any, outer, random

# ─── Favoritos personales ─────────────────────────────────────────────────────
--transition-type grow --transition-duration 0.9 --transition-fps 100
--transition-type outer --transition-duration 0.9 --transition-fps 100

# ─── Fade ─────────────────────────────────────────────────────────────────────
--transition-type fade --transition-duration 1.2 --transition-fps 60
--transition-type fade --transition-duration 0.6 --transition-fps 144

# ─── Direccionales ────────────────────────────────────────────────────────────
--transition-type left --transition-duration 1.0 --transition-fps 100
--transition-type right --transition-duration 1.0 --transition-fps 100
--transition-type top --transition-duration 0.8 --transition-fps 100
--transition-type bottom --transition-duration 0.8 --transition-fps 100

# ─── Wipe con distintos ángulos ───────────────────────────────────────────────
--transition-type wipe --transition-duration 1.0 --transition-fps 100 --transition-angle 30
--transition-type wipe --transition-duration 1.0 --transition-fps 100 --transition-angle 90
--transition-type wipe --transition-duration 1.0 --transition-fps 100 --transition-angle 150

# ─── Wave ─────────────────────────────────────────────────────────────────────
--transition-type wave --transition-duration 1.2 --transition-fps 100 --transition-wave 20,40
--transition-type wave --transition-duration 1.5 --transition-fps 60  --transition-wave 80,20
--transition-type wave --transition-duration 0.9 --transition-fps 144 --transition-wave 40,60

# ─── Grow desde distintas posiciones ──────────────────────────────────────────
--transition-type grow --transition-duration 1.1 --transition-fps 100 --transition-pos 0.0,0.0
--transition-type grow --transition-duration 1.1 --transition-fps 100 --transition-pos 1.0,0.0
--transition-type grow --transition-duration 1.1 --transition-fps 100 --transition-pos 0.5,0.5
--transition-type grow --transition-duration 1.1 --transition-fps 100 --transition-pos 1.0,1.0

# ─── Center ───────────────────────────────────────────────────────────────────
--transition-type center --transition-duration 1.0 --transition-fps 100
--transition-type center --transition-duration 0.7 --transition-fps 144

# ─── Outer ────────────────────────────────────────────────────────────────────
--transition-type outer --transition-duration 1.3 --transition-fps 60
--transition-type outer --transition-duration 0.7 --transition-fps 144

# ─── Rápidas (para cambios frecuentes) ────────────────────────────────────────
--transition-type simple --transition-duration 0.3 --transition-fps 60
--transition-type fade   --transition-duration 0.4 --transition-fps 60
--transition-type grow   --transition-duration 0.5 --transition-fps 100
