# include "/$HOME/.config/kitty/themes/theme-ln.conf" # !(no es necesario por kitty @ set-colors)
include dark-theme.auto.conf
include light-theme.auto.conf
# Config
# -- Font
font_family IosevkaTerm Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 17.0
disable_ligatures never
# active_tab_font_style italic
# inactive_tab_font_style normal
# Others
cursor_shape beam
cursor_shape_unfocused underline
cursor_trail 10
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 4
scrollback_lines 1000
# scrollback always
scrollback_pager nvim #
allow_remote_control yes
listen_on unix:/tmp/kitty.sock
# -- keymaps
map ctrl+alt+r load_config_file
map page_up scroll_page_up
map page_down scroll_page_down
map alt+s show_scrollback

# -- Dev
# # Mínima latencia (a costa de algo más de CPU)
input_delay 0

# Desactiva “battery saving” para que no detenga el render
experimental_update_check_interval 0

# Si tienes GPU moderna, aumenta fps para que el GPU no “dure” frames
gpu_render_cmd_ttl 0
# BEGIN_KITTY_THEME
# noirbuddy-oxide
# include current-theme.conf
# END_KITTY_THEME
